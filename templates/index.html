<!DOCTYPE html>
<html>
<head>
    <title>To Do List</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
        }
        .completed {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- Title -->
    <h1 class="mb-4">✔ to do list</h1>

    <!-- Input -->
    <div class="input-group mb-3">
        <input type="text" id="taskInput" class="form-control" placeholder="Add Item">
        <button class="btn btn-success" onclick="addTask()">Add Item</button>
    </div>

    <!-- Success Message -->
    <div id="msg"></div>

    <!-- Task List -->
    <ul class="list-group" id="taskList"></ul>

</div>

<script>
function showMessage(text) {
    document.getElementById("msg").innerHTML =
        `<div class="alert alert-success">✔ Success! ${text}</div>`;
}

function loadTasks() {
    fetch('/tasks')
    .then(res => res.json())
    .then(data => {
        let list = document.getElementById("taskList");
        list.innerHTML = "";

        data.forEach((item, index) => {

            let textClass = item.done ? "completed" : "";

            let li = document.createElement("li");
            li.className = "list-group-item d-flex justify-content-between align-items-center";

            li.innerHTML = `
                <span class="${textClass}">${item.task}</span>

                <div>
                    <button class="btn btn-primary btn-sm" onclick="editTask(${index})">Edit</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteTask(${index})">Delete</button>
                    <button class="btn btn-warning btn-sm" onclick="toggleTask(${index})">
                        ${item.done ? "Uncross" : "Cross Off"}
                    </button>
                </div>
            `;

            list.appendChild(li);
        });
    });
}

function addTask() {
    let task = document.getElementById("taskInput").value;

    fetch('/add', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({task: task})
    }).then(() => {
        showMessage("New Item Added");
        document.getElementById("taskInput").value = "";
        loadTasks();
    });
}

function deleteTask(index) {
    fetch('/delete/' + index, { method: 'DELETE' })
    .then(() => loadTasks());
}

function toggleTask(index) {
    fetch('/complete/' + index, { method: 'PUT' })
    .then(() => loadTasks());
}

function editTask(index) {
    let newTask = prompt("Edit task:");
    if (newTask) {
        fetch('/edit/' + index, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({task: newTask})
        }).then(() => loadTasks());
    }
}

loadTasks();
</script>

</body>
</html>
